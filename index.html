<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scroll Shooter - Final Build</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="crt"></div>
    
    <div id="ui">
        Score: <span id="score">0</span> <span id="combo"></span><br>
        High: <span id="hiScore">0</span><br>
        Lives: <span id="lives">3</span><br>
        Bombs: <span id="bombs">1</span><br>
        Wave: <span id="wave">1</span>
    </div>
    
    <div id="menu">
        <h1>SCROLL SHOOTER</h1>
        <p>Scroll/Swipe down to thrust.</p>
        <p>Mouse/Touch to steer.</p>
        <p>Click/Tap to fire.</p>
        <p>Shift/Double-Tap for EMP Bomb.</p>
        <button id="startBtn">Start Game</button>
    </div>

    <div id="intro" style="opacity: 0;">
        <p>Keep scrolling...</p>
    </div>

    <div id="warning" style="display: none;">WARNING: MASS DETECTED</div>

    <canvas id="game"></canvas>

    <script src="script.js"></script>
</body>
</html>
